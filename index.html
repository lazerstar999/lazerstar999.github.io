<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>its-luke.com</title>
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>
  <div class="top-bar"></div>
  <div class="xp-wrapper">
    <div class="xp-center">
      <div class="left-side">
        <img class="logo" src="img/xp.png" alt="Windows XP" />
        <div>To begin, click your user name</div>
      </div>

      <div class="right-side">
        <div class="user-box">
          <div class="avatar"></div>
          <div class="user-info">
            <div class="name">Luke</div>
            <div style="margin-top:0.2rem;">Type your password</div>
            <div style="display:flex; align-items:center; gap:0.4rem; margin-top:0.2rem;">
              <input type="password" style="flex:1;" />
              <div class="green-btn">&#x27A1;</div>
              <div class="help-btn">?</div>
            </div>
          </div>
        </div>

        <div class="other-user-box">
          <div class="other-avatar"></div>
          <div class="name" style="margin-top:-10px;">Amina</div>
        </div>
      </div>
    </div>

    <div class="footer-bar">
      <div class="power">
        <div class="power-icon">&#x23FB;</div>
        Turn off computer
      </div>
      <div class="help-text" style="text-align:left; margin:0 2rem 0 0;">
        After you log on, you can add or change accounts.<br/>
        Just go to your Control Panel and click User Accounts.
      </div>
    </div>

  </div>
</body>
</html>
